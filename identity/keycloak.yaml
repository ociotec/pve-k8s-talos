apiVersion: v1
kind: Namespace
metadata:
  name: ${identity_namespace}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgres-data
  namespace: ${identity_namespace}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${postgres_storage_class}
  resources:
    requests:
      storage: ${postgres_pvc_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgres
  namespace: ${identity_namespace}
  labels:
    app.kubernetes.io/part-of: keycloak
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: keycloak-postgres
  template:
    metadata:
      labels:
        app: keycloak-postgres
        app.kubernetes.io/part-of: keycloak
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: /metrics
    spec:
      priorityClassName: infra-critical
      containers:
        - name: postgres
          image: postgres:${postgres_image_tag}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 512Mi
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:${postgres_exporter_image_tag}
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: localhost:5432/${keycloak_db_name}?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: password
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: keycloak-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: ${identity_namespace}
spec:
  selector:
    app: keycloak-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ${identity_namespace}
  labels:
    app.kubernetes.io/part-of: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/part-of: keycloak
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: /metrics
    spec:
      priorityClassName: infra-critical
      initContainers:
        - name: wait-for-postgres
          image: postgres:${postgres_image_tag}
          command:
            - /bin/sh
            - -ec
            - until pg_isready -h keycloak-postgres -p 5432 -U "$POSTGRES_USER"; do sleep 5; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:${keycloak_image_tag}
          args:
            - start
            - --http-enabled=true
            - --hostname=https://${keycloak_hostname}
            - --proxy-headers=xforwarded
          ports:
            - name: http
              containerPort: 8080
            - name: monitoring
              containerPort: 9000
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: keycloak-postgres
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: database
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: password
            - name: KC_BOOTSTRAP_ADMIN_CLIENT_ID
              value: identity-config
            - name: KC_BOOTSTRAP_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: password
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_EVENT_METRICS_USER_ENABLED
              value: "true"
            - name: KC_EVENT_METRICS_USER_TAGS
              value: realm,clientId
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /realms/master
              port: http
              scheme: HTTP
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
          resources:
            requests:
              cpu: "${keycloak_cpu_request}"
              memory: 2Gi
            limits:
              cpu: "${keycloak_cpu_limit}"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ${identity_namespace}
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-cert
  namespace: ${identity_namespace}
spec:
  secretName: ${keycloak_tls_secret}
  issuerRef:
    name: root-ca
    kind: ClusterIssuer
  dnsNames:
    - ${keycloak_hostname}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: ${identity_namespace}
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: 128k
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${keycloak_hostname}
      secretName: ${keycloak_tls_secret}
  rules:
    - host: ${keycloak_hostname}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
