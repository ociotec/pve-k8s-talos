apiVersion: v1
kind: Namespace
metadata:
  name: ${identity_namespace}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-postgres-data
  namespace: ${identity_namespace}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${postgres_storage_class}
  resources:
    requests:
      storage: ${postgres_pvc_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-postgres
  namespace: ${identity_namespace}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: keycloak-postgres
  template:
    metadata:
      labels:
        app: keycloak-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:${postgres_image_tag}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: keycloak-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  namespace: ${identity_namespace}
spec:
  selector:
    app: keycloak-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: ${identity_namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:${postgres_image_tag}
          command:
            - /bin/sh
            - -ec
            - until pg_isready -h keycloak-postgres -p 5432 -U "$POSTGRES_USER"; do sleep 5; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:${keycloak_image_tag}
          args:
            - start
            - --http-enabled=true
            - --hostname=https://${keycloak_hostname}
            - --proxy-headers=xforwarded
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: keycloak-postgres
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: database
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db
                  key: password
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: temp_admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: password
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/master
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: ${identity_namespace}
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-bootstrap-admin
  namespace: ${identity_namespace}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: keycloak-bootstrap-admin
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-bootstrap-admin
          image: quay.io/keycloak/keycloak:${keycloak_image_tag}
          command:
            - /bin/sh
            - -ec
            - |
              KEYCLOAK_URL="http://keycloak:8080"
              KCADM="/opt/keycloak/bin/kcadm.sh"
              ADMIN_USER="$(cat /keycloak-admin/username)"
              ADMIN_PASSWORD="$(cat /keycloak-admin/password)"
              TEMP_USER="temp_admin"

              login() {
                "$${KCADM}" config credentials \
                  --server "$${KEYCLOAK_URL}" \
                  --realm master \
                  --user "$1" \
                  --password "$${ADMIN_PASSWORD}" >/dev/null 2>&1
              }

              user_json() {
                "$${KCADM}" get users -r master -q username="$1"
              }

              user_exists() {
                user_json "$1" | grep -q "\"username\" : \"$1\""
              }

              user_id() {
                user_json "$1" | sed -n 's/.*"id" : "\([^"]*\)".*/\1/p' | head -n1
              }

              has_admin_role() {
                "$${KCADM}" get "users/$1/role-mappings" -r master | grep -q '"name" : "admin"'
              }

              until login "$${TEMP_USER}" || login "$${ADMIN_USER}"; do
                sleep 5
              done

              if ! user_exists "$${ADMIN_USER}"; then
                "$${KCADM}" create users -r master -s username="$${ADMIN_USER}" -s enabled=true
              fi

              ADMIN_USER_ID="$(user_id "$${ADMIN_USER}")"
              [ -n "$${ADMIN_USER_ID}" ]

              "$${KCADM}" set-password -r master --username "$${ADMIN_USER}" --new-password "$${ADMIN_PASSWORD}"
              "$${KCADM}" add-roles -r master --uusername "$${ADMIN_USER}" --rolename admin >/dev/null

              login "$${ADMIN_USER}"

              has_admin_role "$${ADMIN_USER_ID}"

              if user_exists "$${TEMP_USER}"; then
                TEMP_USER_ID="$(user_id "$${TEMP_USER}")"
                if [ -n "$${TEMP_USER_ID}" ]; then
                  "$${KCADM}" delete "users/$${TEMP_USER_ID}" -r master
                fi
              fi
          volumeMounts:
            - name: keycloak-admin
              mountPath: /keycloak-admin
              readOnly: true
      volumes:
        - name: keycloak-admin
          secret:
            secretName: keycloak-admin
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-cert
  namespace: ${identity_namespace}
spec:
  secretName: ${keycloak_tls_secret}
  issuerRef:
    name: root-ca
    kind: ClusterIssuer
  dnsNames:
    - ${keycloak_hostname}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: ${identity_namespace}
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: 128k
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${keycloak_hostname}
      secretName: ${keycloak_tls_secret}
  rules:
    - host: ${keycloak_hostname}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
