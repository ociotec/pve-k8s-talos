apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-postgres-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${grafana_postgres_storage_class}
  resources:
    requests:
      storage: ${grafana_postgres_pvc_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-postgres
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana-postgres
  template:
    metadata:
      labels:
        app: grafana-postgres
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: postgres
          image: postgres:${grafana_postgres_image_tag}
          ports:
            - name: postgres
              containerPort: 5432
          startupProbe:
            exec:
              command:
                - pg_isready
                - -h
                - 127.0.0.1
                - -p
                - "5432"
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - 127.0.0.1
                - -p
                - "5432"
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -h
                - 127.0.0.1
                - -p
                - "5432"
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: ${grafana_postgres_cpu_request}
              memory: ${grafana_postgres_mem_request}
            limits:
              cpu: ${grafana_postgres_cpu_limit}
              memory: ${grafana_postgres_mem_limit}
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:${grafana_postgres_exporter_image_tag}
          ports:
            - name: metrics
              containerPort: 9187
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: DATA_SOURCE_URI
              value: localhost:5432/${grafana_db_name}?sslmode=disable
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: password
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: grafana-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-postgres
  namespace: monitoring
spec:
  selector:
    app: grafana-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${storage_class}
  resources:
    requests:
      storage: ${grafana_storage_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:${grafana_postgres_image_tag}
          command:
            - sh
            - -c
            - until pg_isready -h grafana-postgres -p 5432 -U "$POSTGRES_USER"; do sleep 5; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
          resources:
            requests:
              cpu: ${grafana_wait_for_postgres_cpu_request}
              memory: ${grafana_wait_for_postgres_mem_request}
            limits:
              cpu: ${grafana_wait_for_postgres_cpu_limit}
              memory: ${grafana_wait_for_postgres_mem_limit}
      containers:
        - name: grafana
          image: grafana/grafana:${grafana_image_tag}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: monitoring
              containerPort: 3000
          startupProbe:
            httpGet:
              path: /api/health
              port: monitoring
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: monitoring
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: monitoring
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: ${grafana_cpu_request}
              memory: ${grafana_mem_request}
            limits:
              cpu: ${grafana_cpu_limit}
              memory: ${grafana_mem_limit}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: https://${grafana_hostname}
            - name: GF_METRICS_ENABLED
              value: "true"
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GF_DATABASE_HOST
              value: grafana-postgres:5432
            - name: GF_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: database
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: password
            - name: GF_DATABASE_SSL_MODE
              value: disable
%{ if grafana_auth_enabled ~}
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "${grafana_auth_name}"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: "${grafana_oidc_client_id}"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${grafana_oauth_secret_name}
                  key: client-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "${grafana_auth_scopes}"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "${grafana_oidc_auth_url}"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "${grafana_oidc_token_url}"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "${grafana_oidc_api_url}"
            - name: GF_AUTH_GENERIC_OAUTH_USE_PKCE
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH
              value: preferred_username
            - name: GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH
              value: name
            - name: GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH
              value: email
            - name: GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH
              value: groups
            - name: GF_AUTH_GENERIC_OAUTH_ALLOWED_GROUPS
              value: "${grafana_auth_allowed_groups}"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "${grafana_auth_role_attribute_path}"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "${grafana_auth_allow_sign_up}"
            - name: GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP
              value: "true"
            - name: GF_AUTH_OAUTH_AUTO_LOGIN
              value: "${grafana_auth_auto_login}"
            - name: GF_AUTH_GENERIC_OAUTH_JWK_SET_URL
              value: "${grafana_oidc_jwk_set_url}"
%{ if grafana_auth_ca_enabled ~}
            - name: GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA
              value: /run/secrets/grafana-oauth-ca/ca.crt
%{ endif ~}
            - name: GF_AUTH_SIGNOUT_REDIRECT_URL
              value: "${grafana_oauth_signout_redirect_url}"
%{ endif ~}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
%{ if grafana_auth_ca_enabled ~}
            - name: grafana-oauth-ca
              mountPath: /run/secrets/grafana-oauth-ca
              readOnly: true
%{ endif ~}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items:
%{ for item in grafana_dashboard_volume_items ~}
              - key: ${item.key}
                path: ${item.path}
%{ endfor ~}
%{ if grafana_auth_ca_enabled ~}
        - name: grafana-oauth-ca
          secret:
            secretName: ${grafana_auth_ca_secret_name}
%{ endif ~}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: monitoring
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-dashboard-sync-${grafana_dashboard_sync_hash}
  namespace: monitoring
  labels:
    app: grafana-dashboard-sync
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: grafana-dashboard-sync
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sync
          image: grafana/grafana:${grafana_image_tag}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          args:
            - |
              api_url="http://grafana.monitoring.svc.cluster.local:3000"

              curl_grafana() {
                curl --connect-timeout 5 --max-time 30 -fsS -u "$GRAFANA_ADMIN_USER:$GRAFANA_ADMIN_PASSWORD" "$@"
              }

              until curl_grafana "$api_url/api/health" >/dev/null; do
                sleep 5
              done

              ensure_folder() {
                uid="$1"
                title="$2"
                parent_uid="$${3:-}"

                if curl_grafana "$api_url/api/folders/$uid" >/dev/null 2>&1; then
                  return 0
                fi

                payload="/tmp/folder-$${uid}.json"
                if [ -n "$parent_uid" ]; then
                  printf '{"uid":"%s","title":"%s","parentUid":"%s"}' "$uid" "$title" "$parent_uid" > "$payload"
                else
                  printf '{"uid":"%s","title":"%s"}' "$uid" "$title" > "$payload"
                fi

                code="$(curl --connect-timeout 5 --max-time 30 -sS -u "$GRAFANA_ADMIN_USER:$GRAFANA_ADMIN_PASSWORD" \
                  -H 'Content-Type: application/json' \
                  -o /tmp/folder-response.json \
                  -w '%%{http_code}' \
                  -X POST "$api_url/api/folders" \
                  --data-binary "@$payload")"
                if [ "$code" != "200" ] && [ "$code" != "412" ]; then
                  cat /tmp/folder-response.json
                  exit 1
                fi
              }

              sync_dashboard() {
                file="$1"
                folder_uid="$2"
                uid="$(sed -n 's/^  "uid"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$file" | head -n 1)"
                if [ -z "$uid" ]; then
                  echo "Dashboard $file has no uid" >&2
                  exit 1
                fi

                echo "Syncing dashboard $uid into $folder_uid"
                payload="/tmp/dashboard-$${uid}.json"
                printf '{"dashboard":' > "$payload"
                cat "$file" >> "$payload"
                printf ',"folderUid":"%s","overwrite":true,"message":"provisioned from repository"}' "$folder_uid" >> "$payload"

                code="$(curl --connect-timeout 5 --max-time 30 -sS -u "$GRAFANA_ADMIN_USER:$GRAFANA_ADMIN_PASSWORD" \
                  -H 'Content-Type: application/json' \
                  -o /tmp/dashboard-response.json \
                  -w '%%{http_code}' \
                  -X POST "$api_url/api/dashboards/db" \
                  --data-binary "@$payload")"

                if [ "$code" != "200" ] && [ "$code" != "201" ]; then
                  cat /tmp/dashboard-response.json
                  exit 1
                fi
              }

              sync_dir() {
                dir="$1"
                folder_uid="$2"
                for dashboard in "$dir"/*.json; do
                  [ -e "$dashboard" ] || continue
                  sync_dashboard "$dashboard" "$folder_uid"
                done
              }

              ensure_folder "infrastructure" "Infrastructure"
              ensure_folder "infrastructure-k8s" "K8s" "infrastructure"
              ensure_folder "infrastructure-k8s-net" "K8s net" "infrastructure"
              ensure_folder "infrastructure-nodes" "Nodes" "infrastructure"
              ensure_folder "infrastructure-monitoring" "Monitoring" "infrastructure"
              ensure_folder "infrastructure-identity" "Identity" "infrastructure"
              ensure_folder "infrastructure-platform" "Platform" "infrastructure"
              ensure_folder "infrastructure-rook-ceph" "Rook Ceph" "infrastructure"

              sync_dir /var/lib/grafana/dashboards/infrastructure/k8s infrastructure-k8s
              sync_dir /var/lib/grafana/dashboards/infrastructure/k8s-net infrastructure-k8s-net
              sync_dir /var/lib/grafana/dashboards/infrastructure/nodes infrastructure-nodes
              sync_dir /var/lib/grafana/dashboards/infrastructure/monitoring infrastructure-monitoring
              sync_dir /var/lib/grafana/dashboards/infrastructure/identity infrastructure-identity
              sync_dir /var/lib/grafana/dashboards/infrastructure/rook-ceph infrastructure-rook-ceph
          env:
            - name: GRAFANA_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GRAFANA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
      volumes:
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items:
%{ for item in grafana_dashboard_volume_items ~}
              - key: ${item.key}
                path: ${item.path}
%{ endfor ~}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-cert
  namespace: monitoring
spec:
  secretName: ${grafana_tls_secret_name}
  issuerRef:
    name: root-ca
    kind: ClusterIssuer
  dnsNames:
    - ${grafana_hostname}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${grafana_hostname}
      secretName: ${grafana_tls_secret_name}
  rules:
    - host: ${grafana_hostname}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
