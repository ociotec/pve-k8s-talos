apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-postgres-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${grafana_postgres_storage_class}
  resources:
    requests:
      storage: ${grafana_postgres_pvc_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-postgres
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana-postgres
  template:
    metadata:
      labels:
        app: grafana-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:${grafana_postgres_image_tag}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: grafana-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-postgres
  namespace: monitoring
spec:
  selector:
    app: grafana-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${storage_class}
  resources:
    requests:
      storage: ${grafana_storage_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:${grafana_postgres_image_tag}
          command:
            - sh
            - -c
            - until pg_isready -h grafana-postgres -p 5432 -U "$POSTGRES_USER"; do sleep 5; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
      containers:
        - name: grafana
          image: grafana/grafana:${grafana_image_tag}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: ${grafana_cpu_request}
              memory: ${grafana_mem_request}
            limits:
              cpu: ${grafana_cpu_limit}
              memory: ${grafana_mem_limit}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_SERVER_ROOT_URL
              value: https://${grafana_hostname}
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GF_DATABASE_HOST
              value: grafana-postgres:5432
            - name: GF_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: database
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: username
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-db
                  key: password
            - name: GF_DATABASE_SSL_MODE
              value: disable
%{ if grafana_auth_enabled ~}
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "${grafana_auth_name}"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: "${grafana_oidc_client_id}"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ${grafana_oauth_secret_name}
                  key: client-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "${grafana_auth_scopes}"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "${grafana_oidc_auth_url}"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "${grafana_oidc_token_url}"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "${grafana_oidc_api_url}"
            - name: GF_AUTH_GENERIC_OAUTH_USE_PKCE
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH
              value: preferred_username
            - name: GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH
              value: name
            - name: GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH
              value: email
            - name: GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH
              value: groups
            - name: GF_AUTH_GENERIC_OAUTH_ALLOWED_GROUPS
              value: "${grafana_auth_allowed_groups}"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "${grafana_auth_role_attribute_path}"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "${grafana_auth_allow_sign_up}"
            - name: GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP
              value: "true"
            - name: GF_AUTH_OAUTH_AUTO_LOGIN
              value: "${grafana_auth_auto_login}"
            - name: GF_AUTH_GENERIC_OAUTH_JWK_SET_URL
              value: "${grafana_oidc_jwk_set_url}"
%{ if grafana_auth_ca_enabled ~}
            - name: GF_AUTH_GENERIC_OAUTH_TLS_CLIENT_CA
              value: /run/secrets/grafana-oauth-ca/ca.crt
%{ endif ~}
            - name: GF_AUTH_SIGNOUT_REDIRECT_URL
              value: "${grafana_oauth_signout_redirect_url}"
%{ endif ~}
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
%{ if grafana_auth_ca_enabled ~}
            - name: grafana-oauth-ca
              mountPath: /run/secrets/grafana-oauth-ca
              readOnly: true
%{ endif ~}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
%{ if grafana_auth_ca_enabled ~}
        - name: grafana-oauth-ca
          secret:
            secretName: ${grafana_auth_ca_secret_name}
%{ endif ~}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-cert
  namespace: monitoring
spec:
  secretName: ${grafana_tls_secret_name}
  issuerRef:
    name: root-ca
    kind: ClusterIssuer
  dnsNames:
    - ${grafana_hostname}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${grafana_hostname}
      secretName: ${grafana_tls_secret_name}
  rules:
    - host: ${grafana_hostname}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
