apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
%{ if length(ceph_prometheus_targets) > 0 ~}

      - job_name: ceph-mgr
        scheme: ${ceph_prometheus_scheme}
        static_configs:
          - targets:
%{ for target in ceph_prometheus_targets ~}
              - "${target}"
%{ endfor ~}
            labels:
              cluster: "${ceph_cluster_name}"
              namespace: "${ceph_namespace}"
%{ endif ~}

      - job_name: kubernetes-apiservers
        scheme: https
        kubernetes_sd_configs:
          - role: endpoints
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            regex: default;kubernetes;https

      - job_name: kubernetes-nodes
        scheme: https
        kubernetes_sd_configs:
          - role: node
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: "\\d+"
          - action: keep
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
          - action: drop
            source_labels: [__meta_kubernetes_namespace]
            regex: cert-manager
          - action: replace
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            target_label: __metrics_path__
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
            target_label: __scheme__
            regex: (https?)
          - action: replace
            source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+):\d+;(\d+)
            replacement: $1:$2
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_controller_name]
            target_label: workload
          - action: replace
            source_labels: [__meta_kubernetes_pod_controller_kind]
            target_label: workload_type
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: pod_ip
          - action: replace
            source_labels: [__meta_kubernetes_pod_host_ip]
            target_label: host_ip
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_component]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: (.+)
            replacement: other
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: identity
            replacement: identity
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: monitoring
            replacement: monitoring
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: rook-ceph
            replacement: rook
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: cert-manager|metallb-system|ingress-nginx
            replacement: k8s-net
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: kube-system
            replacement: k8s
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: default
            replacement: ""

      - job_name: kubernetes-service-endpoints
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_port]
            regex: "\\d+"
          - action: keep
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            regex: "true"
          - action: drop
            source_labels: [__meta_kubernetes_namespace]
            regex: cert-manager
          - action: drop
            source_labels: [__meta_kubernetes_pod_annotationpresent_prometheus_io_scrape]
            regex: "true"
          - action: replace
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            target_label: __metrics_path__
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
            target_label: __scheme__
            regex: (https?)
          - action: replace
            source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            target_label: __address__
            regex: (.+):\d+;(\d+)
            replacement: $1:$2
          - action: replace
            source_labels: [__address__]
            target_label: scrape_instance
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_service_name]
            target_label: instance
          - action: replace
            source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_controller_name]
            target_label: workload
          - action: replace
            source_labels: [__meta_kubernetes_pod_controller_kind]
            target_label: workload_type
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: pod_ip
          - action: replace
            source_labels: [__meta_kubernetes_pod_host_ip]
            target_label: host_ip
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            target_label: app
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_service_label_app]
            target_label: app
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_component]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_service_label_component]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
            target_label: component
            regex: (.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: (.+)
            replacement: other
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: identity
            replacement: identity
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: monitoring
            replacement: monitoring
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: rook-ceph
            replacement: rook
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: cert-manager|metallb-system|ingress-nginx
            replacement: k8s-net
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: kube-system
            replacement: k8s
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: section
            regex: default
            replacement: ""

      - job_name: cert-manager
        honor_labels: true
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace]
            regex: cert-manager
          - action: keep
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_instance]
            regex: cert-manager
          - action: keep
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: cainjector|controller|webhook
          - action: keep
            source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: http-metrics
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: scrape_namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          - action: replace
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_version]
            target_label: version
          - action: replace
            target_label: section
            replacement: k8s-net

      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace]
            regex: monitoring
          - action: keep
            source_labels: [__meta_kubernetes_pod_label_app]
            regex: node-exporter
          - action: keep
            source_labels: [__meta_kubernetes_pod_container_port_name]
            regex: metrics
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: instance
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.monitoring.svc.cluster.local:8080"]

      - job_name: coredns
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            regex: kube-system;kube-dns;metrics
          - action: replace
            source_labels: [__meta_kubernetes_endpoint_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - action: replace
            target_label: section
            replacement: k8s

      - job_name: capi-controller-manager
        scheme: https
        kubernetes_sd_configs:
          - role: pod
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_control_plane, __meta_kubernetes_pod_container_port_name]
            regex: cattle-capi-system;controller-manager;metrics
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: pod_ip
          - action: replace
            source_labels: [__meta_kubernetes_pod_host_ip]
            target_label: host_ip
          - action: replace
            source_labels: [__meta_kubernetes_pod_controller_name]
            target_label: workload
          - action: replace
            source_labels: [__meta_kubernetes_pod_controller_kind]
            target_label: workload_type
          - action: replace
            target_label: app
            replacement: capi-controller-manager
          - action: replace
            target_label: component
            replacement: capi-controller-manager
          - action: replace
            target_label: section
            replacement: platform

      - job_name: fleet-controller
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            regex: cattle-fleet-system;monitoring-fleet-controller;metrics
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            target_label: app
            replacement: fleet
          - action: replace
            target_label: component
            replacement: fleet-controller
          - action: replace
            target_label: section
            replacement: platform

      - job_name: fleet-gitjob
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            regex: cattle-fleet-system;monitoring-gitjob;metrics
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - action: replace
            source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            target_label: app
            replacement: fleet
          - action: replace
            target_label: component
            replacement: gitjob
          - action: replace
            target_label: section
            replacement: platform

      - job_name: kubelet-cadvisor
        scheme: https
        kubernetes_sd_configs:
          - role: node
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/cadvisor
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: prometheus
    app.kubernetes.io/managed-by: infrastructure
    pve-k8s-talos/section: monitoring
    pve-k8s-talos/storage-role: metrics
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ${storage_class}
  resources:
    requests:
      storage: ${prometheus_storage_size}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        app.kubernetes.io/part-of: prometheus
    spec:
      priorityClassName: infra-observability
      terminationGracePeriodSeconds: 120
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:${prometheus_image_tag}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: ${prometheus_cpu_request}
              memory: ${prometheus_mem_request}
            limits:
              cpu: ${prometheus_cpu_limit}
              memory: ${prometheus_mem_limit}
          env:
            - name: GOMAXPROCS
              value: "${prometheus_go_max_procs}"
            - name: GOMEMLIMIT
              value: "${prometheus_go_mem_limit}"
            - name: GOGC
              value: "${prometheus_go_gc_percent}"
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=${prometheus_retention}
%{ if trimspace(prometheus_retention_size) != "" ~}
            - --storage.tsdb.retention.size=${prometheus_retention_size}
%{ endif ~}
%{ if prometheus_wal_compression ~}
            - --storage.tsdb.wal-compression
%{ endif ~}
            - --query.max-concurrency=${prometheus_query_max_concurrency}
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          startupProbe:
            httpGet:
              path: /-/healthy
              port: http
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: ${prometheus_startup_probe_failure_threshold}
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-cert
  namespace: monitoring
spec:
  secretName: ${prometheus_tls_secret_name}
  issuerRef:
    name: root-ca
    kind: ClusterIssuer
  dnsNames:
    - ${prometheus_hostname}
    - ${prometheus_api_hostname}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
%{ if prometheus_auth_enabled ~}
    nginx.ingress.kubernetes.io/auth-url: "http://prometheus-oauth2-proxy.monitoring.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Authorization,X-Auth-Request-Access-Token,X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
%{ endif ~}
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${prometheus_hostname}
      secretName: ${prometheus_tls_secret_name}
  rules:
    - host: ${prometheus_hostname}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
